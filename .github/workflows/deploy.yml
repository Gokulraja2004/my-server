name: Deploy

on:
  push:
    branches:
      - main

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Start Application
        run: |
          npm start &
          sleep 15

      # Health Check
      - name: Health Check
        run: |
          curl --fail http://localhost:3000/health || exit 1

      # Readiness Check
      - name: Readiness Check
        run: |
          curl --fail http://localhost:3000/ready || exit 1

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
